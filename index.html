<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
#root{height:100dvh;display:flex;flex-direction:column}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;transition:all .12s}
button:active{opacity:.72!important;transform:scale(.95)!important}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}70%{transform:translateX(8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{transform:translateX(110%)}to{transform:translateX(0)}}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spin{animation:spin .8s linear infinite}
.fade-up{animation:fadeUp .2s ease}
.toast-in{animation:toastIn .3s cubic-bezier(.34,1.56,.64,1)}
.marquee-txt{animation:marquee 30s linear infinite;white-space:nowrap;display:inline-block;padding-right:60px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(4);opacity:0}}
.notif-badge{position:absolute;top:-4px;right:-4px;background:#FF5555;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-con[...]
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.ripple-btn{position:relative;overflow:hidden}
/* Layout */
.shell{display:flex;flex-direction:column;height:100dvh;overflow:hidden;background:var(--bg)}
.layout{display:flex;flex:1;overflow:hidden}
.side-nav{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:10px 8px;gap:4px;overflow-y:auto}
.main-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--header);border-top:1px solid var(--border);z-index:100}
@media(max-width:767px){
  .side-nav{display:none!important}
  .bottom-nav{display:flex}
  .main-area{padding-bottom:62px}
  .grid-2c{grid-template-columns:1fr 1fr!important}
  .grid-3c{grid-template-columns:1fr 1fr!important}
  .grid-4c{grid-template-columns:1fr 1fr!important}
  .hide-mobile{display:none!important}
}
@media(display-mode:standalone){
  body{padding-top:env(safe-area-inset-top)}
  .bottom-nav{padding-bottom:env(safe-area-inset-bottom)}
}
/* CSS Variables injected by JS */
</style>
</head>
<body>
