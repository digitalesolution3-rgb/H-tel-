/* Firestore sync */
function syncCollections(hid,setters){
  if(!db)return()=>{};
  const unsubs=Object.entries(setters).map(([col,setter])=>
    db.collection("shops").doc(hid).collection(col).onSnapshot(snap=>{
      const data=snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.id!=="_init");
      lsSet(hid,col,data);setter(data);
    },()=>{})
  );
  return()=>unsubs.forEach(u=>u());
}

/* ═══════════════════════════════════════════════
   FONCTIONNALITE 4 : ALERTES & NOTIFICATIONS EN TEMPS RÉEL
   Calcule les check-ins/outs urgents + soldes impayés
═══════════════════════════════════════════════ */
function AlertesPanel({T, reservations, rooms}){
  const today = dKey(Date.now());
  const cin = reservations.filter(r=>!r.cancelled&&!r.checkedOut&&r.checkin===today);
  const cout = reservations.filter(r=>!r.cancelled&&!r.checkedOut&&r.checkout===today);
  const demain = dKey(Date.now()+86400000);
  const cinDemain = reservations.filter(r=>!r.cancelled&&r.checkin===demain);
  const impayes = reservations.filter(r=>!r.cancelled&&r.checkin<=today&&r.checkout>today&&(r.paid||0)<(r.roomTotal||0));
  const maintenance = rooms.filter(r=>r.status==="maintenance");
  const items=[
    ...cin.map(r=>({type:"cin",color:T.green,icon:"📥",msg:`Check-in : ${r.clientName} → Ch.${r.roomNum}`})),
    ...cout.map(r=>({type:"cout",color:T.orange,icon:"📤",msg:`Check-out : ${r.clientName} (Ch.${r.roomNum})`})),
    ...impayes.map(r=>({type:"impaye",color:T.red,icon:"⚠️",msg:`Solde impayé : ${r.clientName} — ${fmtF((r.roomTotal||0)-(r.paid||0))}`})),
    ...cinDemain.map(r=>({type:"demain",color:T.blue,icon:"📅",msg:`Arrivée demain : ${r.clientName} → Ch.${r.roomNum}`})),
    ...maintenance.map(r=>({type:"maint",color:T.mute,icon:"🔧",msg:`Chambre ${r.num} en maintenance`})),
  ];
  if(items.length===0) return null;
  return(
    <div style={{background:T.surface,borderRadius:14,padding:12,marginBottom:10}}>
      <div style={{fontWeight:700,fontSize:12,color:T.accent,marginBottom:8}}>🔔 Alertes du jour ({items.length})</div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {items.slice(0,6).map((a,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:a.color+"18",borderLeft:`3px solid ${a.color}`,borderRadius:6,padding:"6px 10px"}}>
            <span style={{fontSize:14}}>{a.icon}</span>
            <span style={{fontSize:11,color:T.text}}>{a.msg}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   BLE THERMAL PRINTER (ESC/POS 80mm)
═══════════════════════════════════════════════ */
class BLEPrinter{
  constructor(){this.dev=null;this.ch=null;this.connected=false;this._listeners=[];this._kt=null;this._printing=false;}
  on(cb){this._listeners.push(cb);return()=>{this._listeners=this._listeners.filter(l=>l!==cb);};}
  emit(d){this._listeners.forEach(l=>l(d));}
  async connect(){
    if(!navigator.bluetooth)throw new Error("Bluetooth non disponible");
    this.emit({status:"searching"});
    const dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:["000018f0-0000-1000-8000-00805f9b34fb","e7810a71-73ae-499d-8c15-faa9aef0c3f2"]});
    this.dev=dev;
    dev.addEventListener("gattserverdisconnected",()=>{this.connected=false;this.emit({status:"disconnected"});this._tryReconnect();});
    await this._doConnect();
    this._startKA();
    this.emit({status:"connected",name:dev.name});
    return dev.name;
  }
  async _doConnect(){
    const srv=await this.dev.gatt.connect();
    const svcs=await srv.getPrimaryServices();
    let c=null;
    for(const s of svcs){const cs=await s.getCharacteristics();for(const ch of cs){if(ch.properties.write||ch.properties.writeWithoutResponse){c=ch;break;}}if(c)break;}
    if(!c)throw new Error("Caracteristique introuvable");
    this.ch=c;this.connected=true;
  }
  _startKA(){clearInterval(this._kt);this._kt=setInterval(async()=>{if(!this.connected||this._printing)return;try{await this.ch?.writeValueWithoutResponse(new Uint8Array([0x1B,0x00]));}catch{this.connected=false;this._tryReconnect();}},8000);}
  async _tryReconnect(){for(let i=0;i<5;i++){await new Promise(r=>setTimeout(r,2500));try{await this._doConnect();this._startKA();this.emit({status:"connected",name:this.dev?.name});return;}catch{}}}
  async disconnect(){clearInterval(this._kt);this.dev?.gatt.disconnect();this.connected=false;this.emit({status:"disconnected"});}
  async print(bytes){
    if(!this.connected||!this.ch)throw new Error("Non connecte");
    this._printing=true;
    try{for(let i=0;i<bytes.length;i+=90){await this.ch.writeValueWithoutResponse(bytes.slice(i,i+90));await new Promise(r=>setTimeout(r,40));}}
    finally{this._printing=false;}
  }
}
const blePrinter=new BLEPrinter();

/* Build ESC/POS receipt bytes */
function buildReceipt(hotel,res,extras,total){
  const W=42;const buf=[];
  const E=0x1B,G=0x1D,LF=0x0A;
  const txt=(s,b)=>{for(let i=0;i<s.length;i++){const c=s.charCodeAt(i);if(c>=32&&c<=126)b.push(c);else if([0xE9,0xE8,0xEB].includes(c))b.push(0x65);else if([0xE0,0xE2].includes(c))b.push(0x61);else if(c===0xF9)b.push(0x75);else if(c===0xE7)b.push(0x63);else if(c===0xEE)b.push(0x69);}};
  const ln=(s,b)=>{txt(s,b);b.push(LF);};
  const row=(l,r,b)=>{const sp=Math.max(1,W-l.length-r.length);ln(l+" ".repeat(sp)+r,b);};
  buf.push(E,0x40,E,0x61,0x01,E,0x45,0x01);ln((hotel.name||"").toUpperCase().slice(0,W),buf);buf.push(E,0x45,0x00);
  if(hotel.phone)ln("Tel: "+hotel.phone,buf);
  if(hotel.address)ln(hotel.address.slice(0,W),buf);
  const now=new Date();ln(`${String(now.getDate()).padStart(2,"0")}/${String(now.getMonth()+1).padStart(2,"0")}/${now.getFullYear()} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`,buf);
  buf.push(E,0x61,0x00);ln("=".repeat(W),buf);
  if(res){ln(`Client : ${(res.clientName||"").slice(0,30)}`,buf);ln(`Chambre: ${res.roomNum||""} (${res.roomType||""})`,buf);ln(`Arrivee: ${res.checkin||""}  Depart: ${res.checkout||""}`,buf);ln(`Nuits  : ${res.nights||1}`,buf);ln("-".repeat(W),buf);}
  (extras||[]).forEach(e=>row((e.label||"").slice(0,28),fmtF(e.amount||0),buf));
  ln("-".repeat(W),buf);buf.push(E,0x45,0x01);row("TOTAL",fmtF(total),buf);buf.push(E,0x45,0x00,E,0x61,0x01);
  ln("Merci de votre sejour !",buf);
  if(hotel.name)ln(hotel.name.slice(0,W),buf);
  buf.push(E,0x64,0x05,G,0x56,0x41,0x03);
  return new Uint8Array(buf);
}
function browserPrint(hotel,res,extras,total){
  let h=`<html><head><meta charset="utf-8"><style>body{font-family:monospace;width:72mm;margin:0 auto;font-size:12px}hr{border:1px dashed #000;margin:6px 0}.row{display:flex;justify-content:space-between}.c{text-align:center}b{font-weight:bold}</style></head><body>`;
  h+=`<div class="c"><b>${(hotel.name||"").toUpperCase()}</b></div>`;
  if(hotel.phone)h+=`<div class="c">Tel: ${hotel.phone}</div>`;
  h+=`<div class="c">${new Date().toLocaleString("fr-FR")}</div><hr>`;
  if(res){h+=`<div>Client: <b>${res.clientName||""}</b></div><div>Ch. ${res.roomNum||""} (${res.roomType||""})</div><div>Arrivee: ${res.checkin||""} - Depart: ${res.checkout||""}</div><div>Nuits: ${res.nights||1}</div><hr>`;}
  (extras||[]).forEach(e=>{h+=`<div class="row"><span>${e.label||""}</span><span>${fmtF(e.amount||0)}</span></div>`;});
  h+=`<hr><div class="row"><b>TOTAL</b><b>${fmtF(total)}</b></div><hr><div class="c">Merci de votre sejour !</div></body></html>`;
  const w=window.open("","_blank","width=420,height=600");if(w){w.document.write(h);w.document.close();setTimeout(()=>{w.print();setTimeout(()=>w.close(),1500);},400);}
}

function ToastStack({toasts}){
  return(<div style={{position:"fixed",bottom:72,right:14,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
    {toasts.map(t=><div key={t.id} className="toast-in" style={{background:t.type==="err"?"#FF5555":t.type==="warn"?"#FF8844":"#22DD88",color:"#000",padding:"10px 16px",borderRadius:14,fontSize:13,fontWeight:700,boxShadow:"0 4px 24px #0006",maxWidth:290}}>{t.msg}</div>)}
  </div>);
}

function Modal({T,title,onClose,wide,children}){
  return(<div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:16,overflowY:"auto"}}>
    <div className="fade-up" style={{background:T.surface,borderRadius:22,padding:20,width:"100%",maxWidth:wide?580:430,maxHeight:"90dvh",overflowY:"auto",border:`1px solid ${T.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:16}}>{title}</div>
        <button onClick={onClose} style={{background:T.rB.bg,border:"none",borderRadius:8,padding:"4px 12px",color:T.red,fontSize:18,lineHeight:1}}>✕</button>
      </div>
      {children}
    </div>
  </div>);
}

function Field({T,label,value,onChange,type="text",ph,req,disabled}){
  return(<div style={{marginBottom:10}}>
    {label&&<div style={{fontSize:11,color:T.mute,marginBottom:3,fontWeight:600}}>{label}{req&&<span style={{color:T.red}}> *</span>}</div>}
    <input type={type} placeholder={ph||label||""} value={value??""} onChange={e=>onChange(e.target.value)} disabled={disabled}
      style={{width:"100%",background:T.inp,border:`1px solid ${T.inpB}`,borderRadius:10,padding:"10px 12px",color:T.text,fontSize:13,opacity:disabled?.6:1}}/>
  </div>);
}

function SelField({T,label,value,onChange,opts,disabled}){
  return(<div style={{marginBottom:10}}>
    {label&&<div style={{fontSize:11,color:T.mute,marginBottom:3,fontWeight:600}}>{label}</div>}
    <select value={value??""} onChange={e=>onChange(e.target.value)} disabled={disabled}
      style={{width:"100%",background:T.inp,border:`1px solid ${T.inpB}`,borderRadius:10,padding:"10px 12px",color:T.text,fontSize:13,opacity:disabled?.6:1}}>
      {opts.map((o,i)=><option key={i} value={typeof o==="object"?o.v:o}>{typeof o==="object"?o.l:o}</option>)}
    </select>
  </div>);
}

function G2({children,gap=8}){return(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap}}>{children}</div>);}
function G3({children,gap=8}){return(<div className="grid-3c" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap}}>{children}</div>);}
function G4({children,gap=8}){return(<div className="grid-4c" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap}}>{children}</div>);}

function PinPad({T,length=4,onConfirm,onCancel,title,subtitle,err}){
  const [val,setVal]=useState("");const [shake,setShake]=useState(false);
  const tap=d=>{if(d==="⌫")setVal(v=>v.slice(0,-1));else if(d!=="")setVal(v=>v.length<length?v+d:v);};
  useEffect(()=>{if(val.length===length)onConfirm(val,()=>{setShake(true);setTimeout(()=>{setShake(false);setVal("");},700);});},[val]);
  return(<div style={{textAlign:"center"}}>
    <div style={{fontSize:40,marginBottom:8}}>{title||"🔐"}</div>
    <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>{subtitle||"Entrez votre PIN"}</div>
    <div style={{fontSize:12,color:T.mute,marginBottom:16}}>PIN a {length} chiffres</div>
    <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:12,animation:shake?"shake .35s":undefined}}>
      {Array(length).fill(0).map((_,i)=><div key={i} style={{width:13,height:13,borderRadius:"50%",background:i<val.length?(err?T.red:T.accent):T.border}}/>)}
    </div>
    {err&&<div style={{fontSize:12,color:T.red,marginBottom:8}}>{err}</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:260,margin:"0 auto 12px"}}>
      {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=><button key={i} onClick={()=>tap(String(d))} style={{background:d===""?"transparent":T.sur2,border:`1px solid ${T.border}`,borderRadius:12,height:52,fontSize:20,fontWeight:600,color:d==="⌫"?T.red:T.text,cursor:d===""?"default":"pointer"}}>{d}</button>)}
    </div>
    {onCancel&&<button onClick={onCancel} style={{background:"transparent",border:"none",color:T.mute,fontSize:13}}>Annuler</button>}
  </div>);
}

function FBStatus({T}){
  const [online,setOnline]=useState(navigator.onLine);
  useEffect(()=>{const a=()=>setOnline(true),b=()=>setOnline(false);window.addEventListener("online",a);window.addEventListener("offline",b);return()=>{window.removeEventListener("online",a);window.removeEventListener("offline",b);};},[]);
  return(<div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:"50%",background:online?T.green:T.red,animation:online?"":"pulse 1.5s infinite"}}/><span style={{fontSize:9,color:T.mute}}>{online?"sync":"offline"}</span></div>);
}

function SubBanner({T,hid}){
  const [sub,setSub]=useState(null);
  useEffect(()=>{if(!db||!hid)return;return db.collection("shops").doc(hid).onSnapshot(d=>{if(d.exists)setSub(d.data());});},[hid]);
  if(!sub?.subscriptionEnd)return null;
  const dl=daysLeft(sub.subscriptionEnd);if(dl>7)return null;
  const msg=dl===0?"⚠️ ABONNEMENT EXPIRE — Contactez votre administrateur ⚠️":`🔔 Abonnement expire dans ${dl} jour${dl>1?"s":""} — Renouvelez maintenant !`;
  return(<div style={{background:dl===0?T.red:T.orange,color:"#fff",padding:"8px 64px 8px 14px",overflow:"hidden",flexShrink:0,position:"relative"}}>
    <div className="marquee-txt">{msg}</div>
    <a href={`https://wa.me/${DEV_WA}?text=${encodeURIComponent("Bonjour, je veux renouveler mon abonnement Hotel SaaS Pro")}`} target="_blank" rel="noreferrer" style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"#fff",color:"#000",padding:"3px 12px",borderRadius:20,fontSize:11,fontWeight:700,textDecoration:"none"}}>📱</a>
  </div>);
}

function BLEBar({T,flash}){
  const [st,setSt]=useState({status:"disconnected"});const [ld,setLd]=useState(false);
  useEffect(()=>blePrinter.on(setSt),[]);
  const ok=st.status==="connected";
  return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,background:T.sur2,borderRadius:12,padding:"8px 14px",border:`1px solid ${ok?T.green+"44":T.border}`,marginBottom:12,flexShrink:0}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>{ok?"🖨️":"🚫"}</span><div style={{fontSize:12,color:ok?T.green:T.sub,fontWeight:600}}>{ok?"Imprimante: "+(st.name||"OK"):"Imprimante hors ligne"}</div></div>
    {ok?<button onClick={()=>blePrinter.disconnect()} style={{background:T.rB.bg,border:"none",borderRadius:8,padding:"4px 12px",color:T.red,fontSize:11}}>Deconnecter</button>
    :<button onClick={async()=>{setLd(true);try{await blePrinter.connect();flash("Imprimante connectee","ok");}catch(e){flash(e.message,"err");}setLd(false);}} disabled={ld} style={{background:T.gB.bg,border:`1px solid ${T.gB.bd}`,borderRadius:8,padding:"4px 12px",color:T.green,fontSize:11}}>🔌 {ld?"...":"Connecter"}</button>}
  </div>);
}

/* ═══════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════ */
function Dashboard({T,rooms,reservations,expenses,services,hotelName,hotelPhone,whatsapp}){
  const today=dKey(Date.now()),cm=mKey(Date.now()),cy=yKey(Date.now());
  const cin=reservations.filter(r=>!r.cancelled&&r.checkin===today);
  const cout=reservations.filter(r=>!r.cancelled&&r.checkout===today);
  const active=reservations.filter(r=>!r.cancelled&&r.checkin<=today&&r.checkout>today);
  const occ=rooms.filter(r=>r.status==="occupee").length;
  const actif=rooms.filter(r=>r.status!=="maintenance").length||1;
  const taux=Math.round(occ/actif*100);
  const revenueDay=reservations.filter(r=>!r.cancelled&&r.checkin===today).reduce((s,r)=>s+(r.paid||0),0);
  const revenueMon=reservations.filter(r=>!r.cancelled&&r.checkin?.startsWith(cm)).reduce((s,r)=>s+(r.paid||0),0);
  const revenueYr=reservations.filter(r=>!r.cancelled&&r.checkin?.startsWith(cy)).reduce((s,r)=>s+(r.paid||0),0);
  const srvDay=(services||[]).filter(s=>dKey(s.ts)===today).reduce((a,b)=>a+(b.amount||0),0);
  const srvMon=(services||[]).filter(s=>mKey(s.ts)===cm).reduce((a,b)=>a+(b.amount||0),0);
  const expDay=expenses.filter(e=>dKey(e.ts)===today).reduce((a,b)=>a+(b.amount||0),0);
  const expMon=expenses.filter(e=>mKey(e.ts)===cm).reduce((a,b)=>a+(b.amount||0),0);
  /* mini bar chart last 7 days */
  const days7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days7.push(d.toISOString().slice(0,10));}
  const chart=days7.map(d=>{const r=reservations.filter(x=>!x.cancelled&&x.checkin===d).reduce((s,b)=>s+(b.paid||0),0);const e=expenses.filter(x=>dKey(x.ts)===d).reduce((s,b)=>s+(b.amount||0),0);return{d:d.slice(5),r,e};});
  const maxV=Math.max(...chart.map(d=>Math.max(d.r,d.e)),1);const H=68;
  const sendReport=()=>{
    const msg=`🏨 RAPPORT HOTEL — ${hotelName}\n📅 ${today}\n\n🛏 Occupation: ${taux}% (${occ}/${actif} ch.)\n📥 Arrivees: ${cin.length}  📤 Departs: ${cout.length}\n\n💰 FINANCES DU JOUR\n• Hebergement: ${fmtF(revenueDay)}\n• Services: ${fmtF(srvDay)}\n• Total recettes: ${fmtF(revenueDay+srvDay)}\n• Depenses: ${fmtF(expDay)}\n• Benefice: ${fmtF(revenueDay+srvDay-expDay)}\n\n📆 CE MOIS\n• CA: ${fmtF(revenueMon+srvMon)}\n• Dep.: ${fmtF(expMon)}\n• Ben.: ${fmtF(revenueMon+srvMon-expMon)}\n\n🗓 ANNEE: ${fmtF(revenueYr)}`;
    window.open(`https://wa.me/${(whatsapp||"").replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");
  };
  return(<div style={{padding:12,overflowY:"auto",flex:1}}>
    <AlertesPanel T={T} reservations={reservations} rooms={rooms}/>
    {/* KPIs */}
    <G4 gap={8}>{[
      {e:"🛏️",l:"Occupation",v:`${taux}%`,s:`${occ}/${actif} ch.`,c:T.accent},
      {e:"📥",l:"Arrivees",v:cin.length,s:"aujourd hui",c:T.green},
      {e:"📤",l:"Departs",v:cout.length,s:"aujourd hui",c:T.orange},
      {e:"💰",l:"CA jour",v:fmtF(revenueDay+srvDay),s:`Ben. ${fmtF(revenueDay+srvDay-expDay)}`,c:T.blue},
    ].map((k,i)=><div key={i} style={{background:T.surface,borderRadius:14,padding:"12px 14px"}}>
      <div style={{fontSize:20,marginBottom:4}}>{k.e}</div>
      <div style={{fontSize:k.v.toString().length>7?15:18,fontWeight:800,color:k.c,lineHeight:1.1}}>{k.v}</div>
      <div style={{fontSize:10,color:T.mute,marginTop:2}}>{k.l}</div>
      <div style={{fontSize:10,color:T.sub,marginTop:1}}>{k.s}</div>
    </div>)}
    </G4>
    {/* Occupation bar */}
    <div style={{background:T.surface,borderRadius:14,padding:14,marginTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontWeight:700,fontSize:13}}>🏨 Etat des chambres</span>
        <span style={{color:T.accent,fontWeight:700,fontSize:13}}>{taux}%</span>
      </div>
      <div style={{height:10,background:T.sur2,borderRadius:5,overflow:"hidden",marginBottom:8}}>
        <div style={{height:"100%",background:`linear-gradient(90deg,${T.red},${T.orange})`,width:`${taux}%`,borderRadius:5,transition:"width .6s"}}/>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:10}}>
        {Object.keys(ROOM_STATUS).map(s=>{const c=rooms.filter(r=>r.status===s).length;return c?<span key={s} style={{color:STATUS_COL(T,s)}}>■ {s} ({c})</span>:null;})}
      </div>
    </div>
    {/* 7-day chart */}
    <div style={{background:T.surface,borderRadius:14,padding:14,marginTop:10}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>📈 7 derniers jours</div>
      <div style={{display:"flex",alignItems:"flex-end",gap:4,height:H+24,justifyContent:"space-around"}}>
        {chart.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:H}}>
            <div style={{flex:1,background:T.green,borderRadius:"3px 3px 0 0",height:`${(d.r/maxV)*H}px`,minHeight:d.r?3:0}}/>
            <div style={{flex:1,background:T.red,borderRadius:"3px 3px 0 0",height:`${(d.e/maxV)*H}px`,minHeight:d.e?3:0}}/>
          </div>
          <div style={{fontSize:8,color:T.mute}}>{d.d}</div>
        </div>)}
      </div>
      <div style={{display:"flex",gap:14,justifyContent:"center",fontSize:10,marginTop:6}}>
        <span style={{color:T.green}}>■ Recettes</span><span style={{color:T.red}}>■ Depenses</span>
      </div>
    </div>
    {/* Arrivees / departs */}
    {(cin.length>0||cout.length>0)&&(<div style={{background:T.surface,borderRadius:14,padding:14,marginTop:10}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>📋 Mouvements du jour</div>
      {cin.map(r=><div key={r.id} style={{borderLeft:`3px solid ${T.green}`,paddingLeft:10,marginBottom:6,fontSize:12}}>
        <span style={{color:T.green,fontWeight:700}}>📥 Arrivee</span>&nbsp;—&nbsp;<b>{r.clientName}</b>&nbsp;|&nbsp;Ch.{r.roomNum}&nbsp;|&nbsp;{r.nights}n
      </div>)}
      {cout.map(r=><div key={r.id} style={{borderLeft:`3px solid ${T.orange}`,paddingLeft:10,marginBottom:6,fontSize:12}}>
        <span style={{color:T.orange,fontWeight:700}}>📤 Depart</span>&nbsp;—&nbsp;<b>{r.clientName}</b>&nbsp;|&nbsp;Ch.{r.roomNum}
      </div>)}
    </div>)}
    {/* Finances tableau */}
    <div style={{background:T.surface,borderRadius:14,padding:14,marginTop:10}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>💼 Tableau financier</div>
      {[
        {l:"Hebergement jour",v:revenueDay,c:T.green},
        {l:"Services jour",v:srvDay,c:T.teal},
        {l:"Depenses jour",v:expDay,c:T.red},
        {l:"Benefice jour",v:revenueDay+srvDay-expDay,c:revenueDay+srvDay-expDay>=0?T.green:T.red},
        {l:"CA mois (heb.+srv.)",v:revenueMon+srvMon,c:T.blue},
        {l:"Depenses mois",v:expMon,c:T.orange},
        {l:"CA annee",v:revenueYr,c:T.purple},
      ].map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`,fontSize:12}}>
        <span style={{color:T.sub}}>{r.l}</span><span style={{fontWeight:700,color:r.c}}>{fmtF(r.v)}</span>
      </div>)}
    </div>
    <button onClick={sendReport} style={{width:"100%",marginTop:12,background:T.gB.bg,border:`1px solid ${T.gB.bd}`,borderRadius:12,padding:13,color:T.green,fontWeight:700,fontSize:14}}>📱 Envoyer rapport WhatsApp</button>
  </div>);
}


/* ═══════════════════════════════════════════════
   CHAMBRES
═══════════════════════════════════════════════ */
function Chambres({T,rooms,setRooms,reservations,hid,flash}){
  const [filter,setFilter]=useState("all");const [modal,setModal]=useState(null);const [form,setForm]=useState(null);
  const today=dKey(Date.now());
  const list=filter==="all"?rooms:rooms.filter(r=>r.status===filter);
  const resForRoom=rid=>reservations.find(r=>!r.cancelled&&r.roomId===rid&&r.checkin<=today&&r.checkout>today);

  const saveRoom=async d=>{
    const id=d.id||uid();const room={...d,id};
    const updated=d.id?rooms.map(r=>r.id===id?room:r):[...rooms,room];
    setRooms(updated);lsSet(hid,"rooms",updated);await fsSet(hid,"rooms",id,room);
    flash(d.id?"Chambre modifiee !":"Chambre ajoutee !");setForm(null);
  };
  const delRoom=async r=>{if(!confirm(`Supprimer chambre ${r.num} ?`))return;const u=rooms.filter(x=>x.id!==r.id);setRooms(u);lsSet(hid,"rooms",u);await fsDel(hid,"rooms",r.id);flash("Chambre supprimee");};
  const setStatus=async(r,s)=>{const u=rooms.map(x=>x.id===r.id?{...x,status:s}:x);setRooms(u);lsSet(hid,"rooms",u);await fsUpd(hid,"rooms",r.id,{status:s});flash(`Ch.${r.num} → ${s}`);};

  const RoomForm=({init,onDone,onClose})=>{
    const [f,setF]=useState(init||{num:"",type:"Double",price:"",floor:"1",beds:"2",maxGuests:"2",area:"",amenities:[],status:"libre",notes:""});
    const toggle=a=>setF(p=>({...p,amenities:(p.amenities||[]).includes(a)?(p.amenities||[]).filter(x=>x!==a):[...(p.amenities||[]),a]}));
    return(<Modal T={T} title={f.id?"✏️ Modifier chambre":"➕ Nouvelle chambre"} onClose={onClose}>
      <G2><Field T={T} label="N° chambre" value={f.num} onChange={v=>setF(p=>({...p,num:v}))} req/><Field T={T} label="Etage" value={f.floor} onChange={v=>setF(p=>({...p,floor:v}))}/></G2>
      <SelField T={T} label="Type" value={f.type} onChange={v=>setF(p=>({...p,type:v}))} opts={ROOM_TYPES}/>
      <Field T={T} label="Prix par nuit (F CFA)" value={f.price} onChange={v=>setF(p=>({...p,price:v.replace(/\D/g,"")}))} req/>
      <G2><Field T={T} label="Lits" value={f.beds} onChange={v=>setF(p=>({...p,beds:v.replace(/\D/g,"")}))} /><Field T={T} label="Personnes max" value={f.maxGuests} onChange={v=>setF(p=>({...p,maxGuests:v.replace(/\D/g,"")}))}/></G2>
      <Field T={T} label="Superficie (m²)" value={f.area} onChange={v=>setF(p=>({...p,area:v}))}/>
      <SelField T={T} label="Statut" value={f.status} onChange={v=>setF(p=>({...p,status:v}))} opts={Object.values(ROOM_STATUS)}/>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:T.mute,marginBottom:6,fontWeight:600}}>Equipements</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {AMENITIES_LIST.map(a=>{const has=(f.amenities||[]).includes(a);return(<button key={a} onClick={()=>toggle(a)} style={{background:has?T.accent:T.sur2,border:`1px solid ${has?T.accent:T.border}`,borderRadius:8,padding:"4px 9px",fontSize:10,fontWeight:600,color:has?T.bg:T.text}}>{a}</button>);})}
        </div>
      </div>
      <Field T={T} label="Notes / Remarques" value={f.notes||""} onChange={v=>setF(p=>({...p,notes:v}))}/>
      <div style={{display:"flex",gap:8,marginTop:6}}>
        <button onClick={onClose} style={{flex:1,background:T.sur2,border:"none",borderRadius:10,padding:11,color:T.text,fontSize:13}}>Annuler</button>
        <button onClick={()=>onDone(f)} style={{flex:2,background:T.accent,border:"none",borderRadius:10,padding:11,color:T.bg,fontWeight:700,fontSize:13}}>Enregistrer</button>
      </div>
    </Modal>);
  };

  const RoomDetail=({room,onClose})=>{
    const res=resForRoom(room.id);
    const col=STATUS_COL(T,room.status);
    return(<Modal T={T} title={`🛏️ Chambre ${room.num}`} onClose={onClose}>
      <div style={{background:T.sur2,borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:10}}>
          <div style={{fontSize:32,fontWeight:900,fontFamily:"Outfit",color:T.accent}}>#{room.num}</div>
          <span style={{padding:"3px 12px",background:`${col}22`,color:col,borderRadius:20,fontSize:12,fontWeight:700}}>{STATUS_ICO(room.status)} {room.status}</span>
        </div>
        <G2 gap={8}>
          {[["Type",room.type],["Etage",room.floor],["Lits",room.beds],["Max pers.",room.maxGuests],["Prix/nuit",fmtF(room.price)],["Superficie",room.area?(room.area+"m²"):"—"]].map(([k,v])=><div key={k}><div style={{fontSize:10,color:T.mute,fontWeight:600}}>{k}</div><div style={{fontWeight:700,marginTop:2,fontSize:13}}>{v}</div></div>)}
        </G2>
        {(room.amenities||[]).length>0&&(<div style={{marginTop:10}}>
          <div style={{fontSize:10,color:T.mute,marginBottom:5,fontWeight:600}}>Equipements</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{room.amenities.map(a=><span key={a} style={{background:T.accent,color:T.bg,borderRadius:6,padding:"2px 9px",fontSize:10,fontWeight:700}}>{a}</span>)}</div>
        </div>)}
        {room.notes&&<div style={{marginTop:8,fontSize:12,color:T.sub,fontStyle:"italic"}}>📝 {room.notes}</div>}
      </div>
      {res&&<div style={{background:T.bB.bg,border:`1px solid ${T.bB.bd}`,borderRadius:12,padding:12,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:T.blue,marginBottom:5}}>🔴 Reservation en cours</div>
        <div style={{fontSize:12}}><b>{res.clientName}</b> — {res.checkin} → {res.checkout}</div>
        <div style={{fontSize:11,color:T.sub,marginTop:2}}>{res.nights}n · {res.adults||1} adulte{(res.adults||1)>1?"s":""}{res.children>0?` · ${res.children} enfant`+( res.children>1?"s":""):"" }</div>
      </div>}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button onClick={()=>{setModal(null);setForm(room);}} style={{flex:"1 1 auto",background:T.bB.bg,border:`1px solid ${T.bB.bd}`,borderRadius:10,padding:"9px",color:T.blue,fontSize:12,fontWeight:600}}>✏️ Modifier</button>
        {Object.values(ROOM_STATUS).filter(s=>s!==room.status).map(s=><button key={s} onClick={()=>{setStatus(room,s);setModal(null);}} style={{flex:"1 1 auto",background:T.sur2,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px",color:T.text,fontSize:10}}>{STATUS_ICO(s)} {s}</button>)}
        <button onClick={()=>{delRoom(room);setModal(null);}} style={{flex:"1 1 auto",background:T.rB.bg,border:`1px solid ${T.rB.bd}`,borderRadius:10,padding:"9px",color:T.red,fontSize:12,fontWeight:600}}>🗑️ Supprimer</button>
      </div>
    </Modal>);
  };

  return(<div style={{flex:1,overflowY:"auto",padding:12}}>
    <CalendrierOccupation T={T} rooms={rooms} reservations={reservations}/>
    <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
      <button onClick={()=>setForm({})} style={{background:T.accent,border:"none",borderRadius:10,padding:"8px 16px",fontWeight:700,color:T.bg,fontSize:13}}>+ Chambre</button>
      <div style={{flex:1,display:"flex",gap:4,overflowX:"auto"}}>
        {["all",...Object.values(ROOM_STATUS)].map(s=><button key={s} onClick={()=>setFilter(s)} style={{flexShrink:0,background:filter===s?T.accent:T.surface,border:"none",borderRadius:8,padding:"6px 10px",fontSize:10,fontWeight:600,color:filter===s?T.bg:T.text,whiteSpace:"nowrap"}}>{s==="all"?"Toutes":s} ({s==="all"?rooms.length:rooms.filter(r=>r.status===s).length})</button>)}
      </div>
    </div>
    {list.length===0&&<div style={{textAlign:"center",padding:48,color:T.mute,fontSize:14}}>Aucune chambre</div>}
    <div className="grid-3c" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
      {list.map(room=>{
        const res=resForRoom(room.id);const col=STATUS_COL(T,room.status);
        return(<div key={room.id} onClick={()=>setModal(room)} style={{background:T.surface,borderRadius:14,padding:12,cursor:"pointer",border:`2px solid ${col}28`,transition:"border-color .15s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:6}}>
            <div style={{fontSize:24,fontWeight:900,fontFamily:"Outfit",color:T.accent,lineHeight:1}}>#{room.num}</div>
            <span style={{fontSize:17}}>{STATUS_ICO(room.status)}</span>
          </div>
          <div style={{fontSize:11,fontWeight:700,color:col,marginBottom:2}}>{room.status}</div>
          <div style={{fontSize:10,color:T.sub}}>{room.type} · {room.floor}F</div>
          <div style={{fontSize:12,color:T.accent,marginTop:5,fontWeight:700}}>{fmtF(room.price)}<span style={{fontSize:9,color:T.mute}}>/nuit</span></div>
          {res&&<div style={{fontSize:9,color:T.blue,marginTop:4,borderTop:`1px solid ${T.border}`,paddingTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>👤 {res.clientName?.split(" ")[0]} → {res.checkout}</div>}
          {(room.amenities||[]).length>0&&<div style={{fontSize:8,color:T.mute,marginTop:3}}>{room.amenities.slice(0,2).join(" · ")}{room.amenities.length>2?` +${room.amenities.length-2}`:""}</div>}
        </div>);
      })}
    </div>
    {form!==null&&<RoomForm init={form.id?form:null} onDone={saveRoom} onClose={()=>setForm(null)}/>}
    {modal&&<RoomDetail room={modal} onClose={()=>setModal(null)}/>}
  </div>);
}

/* ═══════════════════════════════════════════════
   RÉSERVATIONS
═══════════════════════════════════════════════ */
function Reservations({T,rooms,reservations,setReservations,hid,flash,addService,hotelName,hotelPhone,hotelAddress,useBLE,setUseBLE}){
  const [tab,setTab]=useState("current");const [modal,setModal]=useState(null);const [form,setForm]=useState(null);const [q,setQ]=useState("");
  const today=dKey(Date.now());
  const tabs={
    current:reservations.filter(r=>!r.cancelled&&r.checkin<=today&&r.checkout>today),
    upcoming:reservations.filter(r=>!r.cancelled&&r.checkin>today),
    past:reservations.filter(r=>!r.cancelled&&r.checkout<=today),
    cancelled:reservations.filter(r=>r.cancelled),
  };
  const shown=tabs[tab].filter(r=>(r.clientName||"").toLowerCase().includes(q.toLowerCase())||(r.roomNum||"").includes(q)||(r.clientPhone||"").includes(q));

  const saveRes=async d=>{
    const id=d.id||uid();const n=nightsBetween(d.checkin,d.checkout);const rp=parseInt(d.roomPrice||0);
    const rec={...d,id,nights:n,roomTotal:rp*n,paid:d.paid!==undefined?Number(d.paid):rp*n,createdAt:d.createdAt||Date.now()};
    const updated=d.id?reservations.map(r=>r.id===id?rec:r):[...reservations,rec];
    setReservations(updated);lsSet(hid,"reservations",updated);await fsSet(hid,"reservations",id,rec);
    flash(d.id?"Reservation modifiee !":"Reservation creee !");setForm(null);
  };
  const cancelRes=async(r,reason)=>{
    const u=reservations.map(x=>x.id===r.id?{...x,cancelled:true,cancelReason:reason,cancelledAt:Date.now()}:x);
    setReservations(u);lsSet(hid,"reservations",u);await fsUpd(hid,"reservations",r.id,{cancelled:true,cancelReason:reason,cancelledAt:Date.now()});flash("Reservation annulee");
  };
  const doCheckout=async r=>{
    const u=reservations.map(x=>x.id===r.id?{...x,checkedOut:true,checkoutAt:Date.now()}:x);
    setReservations(u);lsSet(hid,"reservations",u);await fsUpd(hid,"reservations",r.id,{checkedOut:true,checkoutAt:Date.now()});flash(`Depart de ${r.clientName} enregistre`);
  };
  const printRes=async r=>{
    const extras=[{label:`Chambre x${r.nights}`,amount:(r.roomPrice||0)*(r.nights||1)}];
    const hotel={name:hotelName,phone:hotelPhone,address:hotelAddress};
    if(blePrinter.connected&&useBLE){try{await blePrinter.print(buildReceipt(hotel,r,extras,r.paid||r.roomTotal));flash("Ticket imprime !");}catch(e){flash(e.message,"err");}}
    else browserPrint(hotel,r,extras,r.paid||r.roomTotal);
  };

  const ResForm=({init,onDone,onClose})=>{
    const [f,setF]=useState(init||{clientName:"",clientPhone:"",clientEmail:"",clientNID:"",nationality:"Burkinabe",roomId:"",roomNum:"",roomType:"",roomPrice:"",checkin:today,checkout:"",adults:"1",children:"0",payMethod:"Especes",paid:"",deposit:"",notes:"",source:"Direct"});
    const n=f.checkin&&f.checkout?nightsBetween(f.checkin,f.checkout):0;
    const rp=parseInt(f.roomPrice||0);const total=rp*n;
    const pickRoom=id=>{const r=rooms.find(rm=>rm.id===id);if(r)setF(p=>({...p,roomId:id,roomNum:r.num,roomType:r.type,roomPrice:String(r.price)}));};
    const availRooms=rooms.filter(r=>r.status==="libre"||r.status==="reservee"||r.id===f.roomId);
    return(<Modal T={T} title={f.id?"✏️ Modifier reservation":"📅 Nouvelle reservation"} onClose={onClose} wide>
      <div style={{fontSize:11,color:T.teal,fontWeight:700,letterSpacing:.5,marginBottom:8}}>● CLIENT</div>
      <G2><Field T={T} label="Nom complet" value={f.clientName} onChange={v=>setF(p=>({...p,clientName:v}))} req/><Field T={T} label="Telephone" value={f.clientPhone} onChange={v=>setF(p=>({...p,clientPhone:v}))}/></G2>
      <G2><Field T={T} label="Email" value={f.clientEmail||""} onChange={v=>setF(p=>({...p,clientEmail:v}))}/><Field T={T} label="N° Piece identite" value={f.clientNID||""} onChange={v=>setF(p=>({...p,clientNID:v}))}/></G2>
      <Field T={T} label="Nationalite" value={f.nationality||""} onChange={v=>setF(p=>({...p,nationality:v}))}/>
      <div style={{fontSize:11,color:T.teal,fontWeight:700,letterSpacing:.5,marginTop:4,marginBottom:8}}>● CHAMBRE & SEJOUR</div>
      <SelField T={T} label="Chambre" value={f.roomId} onChange={pickRoom} opts={[{v:"",l:"-- Choisir chambre --"},...availRooms.map(r=>({v:r.id,l:`Ch.${r.num} — ${r.type} (${fmtF(r.price)}/nuit)`}))]}/>
      <G2><Field T={T} label="Date arrivee" type="date" value={f.checkin} onChange={v=>setF(p=>({...p,checkin:v}))} req/><Field T={T} label="Date depart" type="date" value={f.checkout} onChange={v=>setF(p=>({...p,checkout:v}))} req/></G2>
      {n>0&&<div style={{background:T.sur2,borderRadius:10,padding:10,marginBottom:10,fontSize:12,display:"flex",gap:16}}>
        <span>🌙 <b>{n} nuit{n>1?"s":""}</b></span><span style={{color:T.mute}}>|</span><span>💰 Total chambre : <b style={{color:T.accent}}>{fmtF(total)}</b></span>
      </div>}
      <G2><Field T={T} label="Adultes" value={f.adults} onChange={v=>setF(p=>({...p,adults:v.replace(/\D/g,"")}))} /><Field T={T} label="Enfants" value={f.children} onChange={v=>setF(p=>({...p,children:v.replace(/\D/g,"")}))}/></G2>
      <div style={{fontSize:11,color:T.teal,fontWeight:700,letterSpacing:.5,marginTop:4,marginBottom:8}}>● PAIEMENT</div>
      <SelField T={T} label="Mode de paiement" value={f.payMethod} onChange={v=>setF(p=>({...p,payMethod:v}))} opts={PAY_METHODS}/>
      <G2>
        <Field T={T} label="Montant recu (F)" value={f.paid!==undefined?String(f.paid):""} onChange={v=>setF(p=>({...p,paid:v.replace(/\D/g,"")}))} ph={`${total} F`}/>
        <Field T={T} label="Avance/Acompte (F)" value={f.deposit||""} onChange={v=>setF(p=>({...p,deposit:v.replace(/\D/g,"")}))}/>
      </G2>
      <SelField T={T} label="Source" value={f.source||"Direct"} onChange={v=>setF(p=>({...p,source:v}))} opts={SOURCES}/>
      <Field T={T} label="Notes" value={f.notes||""} onChange={v=>setF(p=>({...p,notes:v}))}/>
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <button onClick={onClose} style={{flex:1,background:T.sur2,border:"none",borderRadius:10,padding:11,color:T.text}}>Annuler</button>
        <button onClick={()=>onDone({...f,paid:f.paid!==undefined&&f.paid!==""?parseInt(f.paid):total})} style={{flex:2,background:T.accent,border:"none",borderRadius:10,padding:11,color:T.bg,fontWeight:700}}>Enregistrer</button>
      </div>
    </Modal>);
  };

  const ResDetail=({res,onClose})=>{
    const [cancelMode,setCancelMode]=useState(false);const [cancelReason,setCancelReason]=useState("");
    const [srvMode,setSrvMode]=useState(false);const [srvCat,setSrvCat]=useState("Autre");const [srvLabel,setSrvLabel]=useState("");const [srvAmt,setSrvAmt]=useState("");
    const isActive=!res.cancelled&&today>=res.checkin&&today<res.checkout;
    const statusLabel=res.cancelled?"ANNULE":isActive?"EN COURS":today<res.checkin?"A VENIR":"PASSE";
    const statusCol=res.cancelled?T.red:isActive?T.green:today<res.checkin?T.blue:T.mute;
    const solde=(res.paid||0)-(res.roomTotal||0);
    return(<Modal T={T} title={`📋 Res. #${res.id.slice(-6).toUpperCase()}`} onClose={onClose} wide>
      <div style={{background:T.sur2,borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:16}}>{res.clientName}</div>
          <span style={{background:`${statusCol}22`,color:statusCol,padding:"3px 12px",borderRadius:20,fontSize:11,fontWeight:700}}>{statusLabel}</span>
        </div>
        <G2 gap={6}>
          {[["📞",res.clientPhone||"—"],["🪪",res.clientNID||"—"],["🌍",res.nationality||"—"],["📧",res.clientEmail||"—"],["🛏️",`Ch.${res.roomNum} (${res.roomType})`],["📅",`${res.checkin} → ${res.checkout}`],["🌙",`${res.nights||1} nuit${(res.nights||1)>1?"s":""}`],["👥",`${res.adults||1}A${res.children>0?` ${res.children}E`:""}`],["💳",res.payMethod||"—"],["🌐",res.source||"Direct"]].map(([i,v])=><div key={i} style={{fontSize:11}}><span style={{marginRight:5}}>{i}</span><b>{v}</b></div>)}
        </G2>
        {res.notes&&<div style={{marginTop:8,fontSize:11,color:T.sub,borderTop:`1px solid ${T.border}`,paddingTop:6}}>📝 {res.notes}</div>}
      </div>
      <div style={{background:T.sur2,borderRadius:12,padding:12,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>💰 Paiement</div>
        {[["Total chambre",fmtF(res.roomTotal||0),T.text],["Montant recu",fmtF(res.paid||0),T.green],["Acompte",fmtF(res.deposit||0),T.teal],["Solde",fmtF(solde),solde>=0?T.green:T.red]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${T.border}`,fontSize:12}}><span style={{color:T.sub}}>{l}</span><span style={{fontWeight:700,color:c}}>{v}</span></div>)}
      </div>
      {!res.cancelled&&(<>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          <button onClick={()=>printRes(res)} style={{flex:"1 1 auto",background:T.bB.bg,border:`1px solid ${T.bB.bd}`,borderRadius:10,padding:"8px",color:T.blue,fontSize:12,fontWeight:600}}>🖨️ Imprimer</button>
          <button onClick={()=>{setForm(res);onClose();}} style={{flex:"1 1 auto",background:T.sur2,border:"none",borderRadius:10,padding:"8px",color:T.text,fontSize:12}}>✏️ Modifier</button>
          {isActive&&!res.checkedOut&&<button onClick={()=>{doCheckout(res);onClose();}} style={{flex:"1 1 auto",background:T.gB.bg,border:`1px solid ${T.gB.bd}`,borderRadius:10,padding:"8px",color:T.green,fontSize:12,fontWeight:600}}>📤 Check-out</button>}
          <button onClick={()=>setCancelMode(true)} style={{flex:"1 1 auto",background:T.rB.bg,border:`1px solid ${T.rB.bd}`,borderRadius:10,padding:"8px",color:T.red,fontSize:12}}>✕ Annuler</button>
        </div>
        {cancelMode&&<div style={{background:T.rB.bg,borderRadius:12,padding:12,marginBottom:10}}>
          <Field T={T} label="Motif annulation" value={cancelReason} onChange={setCancelReason} ph="Saisir le motif..."/>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setCancelMode(false)} style={{flex:1,background:T.sur2,border:"none",borderRadius:8,padding:9,color:T.text,fontSize:12}}>Retour</button>
            <button onClick={()=>{cancelRes(res,cancelReason||"Non specifie");onClose();}} style={{flex:1,background:T.red,border:"none",borderRadius:8,padding:9,color:"#fff",fontWeight:700,fontSize:12}}>Confirmer annulation</button>
          </div>
        </div>}
        {/* Ajout service */}
        <div style={{background:T.sur2,borderRadius:12,padding:12}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>➕ Service / Consommation</div>
          {!srvMode?<button onClick={()=>setSrvMode(true)} style={{width:"100%",background:T.surface,border:`1px dashed ${T.border}`,borderRadius:10,padding:10,color:T.sub,fontSize:12}}>+ Ajouter service / extra</button>
          :<>
            <SelField T={T} label="Categorie" value={srvCat} onChange={setSrvCat} opts={SRV_CATS}/>
            <Field T={T} label="Description" value={srvLabel} onChange={setSrvLabel} req/>
            <Field T={T} label="Montant (F)" value={srvAmt} onChange={v=>setSrvAmt(v.replace(/\D/g,""))} req/>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setSrvMode(false)} style={{flex:1,background:T.sur2,border:"none",borderRadius:8,padding:9,color:T.text,fontSize:12}}>Annuler</button>
              <button onClick={()=>{if(srvLabel&&srvAmt){addService({reservationId:res.id,clientName:res.clientName,roomNum:res.roomNum,label:srvLabel,category:srvCat,amount:parseInt(srvAmt)});setSrvLabel("");setSrvAmt("");setSrvMode(false);}}} style={{flex:1,background:T.accent,border:"none",borderRadius:8,padding:9,color:T.bg,fontWeight:700,fontSize:12}}>Valider</button>
            </div>
          </>}
        </div>
      </>)}
      {res.cancelled&&<div style={{background:T.rB.bg,border:`1px solid ${T.rB.bd}`,borderRadius:12,padding:12,marginTop:10,fontSize:12,color:T.red}}>❌ Annule : {res.cancelReason||"—"}</div>}
    </Modal>);
  };

  const tabLabels={current:`En cours (${tabs.current.length})`,upcoming:`A venir (${tabs.upcoming.length})`,past:`Terminees (${tabs.past.length})`,cancelled:`Annulees (${tabs.cancelled.length})`};
  return(<div style={{flex:1,overflowY:"auto",padding:12}}>
    <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
      <button onClick={()=>setForm({})} style={{background:T.accent,border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,color:T.bg,fontSize:13,flexShrink:0}}>+ Reservation</button>
      <button onClick={()=>setUseBLE(!useBLE)} title={useBLE?"Mode BLE actif":"Mode navigateur actif"} style={{background:useBLE?T.gB.bg:T.sur2,border:`1px solid ${useBLE?T.gB.bd:T.border}`,borderRadius:10,padding:"9px 10px",color:useBLE?T.green:T.sub,fontSize:12,flexShrink:0}}>{useBLE?"🖨️":"🖥️"}</button>
    </div>
    <input placeholder="🔍 Nom, tél, chambre..." value={q} onChange={e=>setQ(e.target.value)} style={{width:"100%",background:T.inp,border:`1px solid ${T.inpB}`,borderRadius:10,padding:"9px 12px",color:T.text,fontSize:12,marginBottom:10}}/>
    <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto"}}>
      {Object.entries(tabLabels).map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{flexShrink:0,background:tab===k?T.accent:T.surface,border:"none",borderRadius:8,padding:"7px 10px",fontSize:10,fontWeight:700,color:tab===k?T.bg:T.text,whiteSpace:"nowrap"}}>{l}</button>)}
    </div>
    {shown.length===0&&<div style={{textAlign:"center",padding:40,color:T.mute}}>Aucune reservation</div>}
    {shown.map(res=>{
      const isActive=!res.cancelled&&today>=res.checkin&&today<res.checkout;
      const lc=res.cancelled?T.red:isActive?T.green:T.blue;
      return(<div key={res.id} onClick={()=>setModal(res)} style={{background:T.surface,borderRadius:12,padding:12,marginBottom:8,borderLeft:`4px solid ${lc}`,cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{res.clientName}</div>
            <div style={{fontSize:11,color:T.sub,marginTop:2}}>Ch.{res.roomNum} · {res.checkin} → {res.checkout} · {res.nights}n</div>
            <div style={{fontSize:10,color:T.mute}}>{res.adults||1}A{res.children>0?` ${res.children}E`:""} · {res.source||"Direct"}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontWeight:800,color:T.accent,fontSize:13}}>{fmtF(res.paid||res.roomTotal||0)}</div>
            <div style={{fontSize:9,color:T.mute,marginTop:2}}>{res.payMethod}</div>
          </div>
        </div>
        {res.cancelled&&<div style={{fontSize:10,color:T.red,marginTop:4}}>❌ {res.cancelReason}</div>}
      </div>);
    })}
    {form!==null&&<ResForm init={form.id?form:null} onDone={saveRes} onClose={()=>setForm(null)}/>}
    {modal&&<ResDetail res={modal} onClose={()=>setModal(null)}/>}
  </div>);
}


/* ═══════════════════════════════════════════════
   CLIENTS
═══════════════════════════════════════════════ */
function Clients({T,clients,setClients,reservations,hid,flash}){
  const [q,setQ]=useState("");const [modal,setModal]=useState(null);const [form,setForm]=useState(null);
  const saveClient=async d=>{const id=d.id||uid();const cl={...d,id,updatedAt:Date.now()};const u=d.id?clients.map(c=>c.id===id?cl:c):[...clients,cl];setClients(u);lsSet(hid,"clients",u);await fsSet(hid,"clients",id,cl);flash(d.id?"Client modifie !":"Client ajoute !");setForm(null);};
  const delClient=async cl=>{if(!confirm(`Supprimer ${cl.name} ?`))return;const u=clients.filter(c=>c.id!==cl.id);setClients(u);lsSet(hid,"clients",u);await fsDel(hid,"clients",cl.id);flash("Client supprime");};
  const list=clients.filter(c=>(c.name||"").toLowerCase().includes(q.toLowerCase())||(c.phone||"").includes(q));

  const ClientForm=({init,onDone,onClose})=>{
    const [f,setF]=useState(init||{name:"",phone:"",email:"",nid:"",nationality:"Burkinabe",address:"",notes:"",vip:false,blacklist:false});
    return(<Modal T={T} title={f.id?"✏️ Modifier client":"👤 Nouveau client"} onClose={onClose}>
      <Field T={T} label="Nom complet" value={f.name} onChange={v=>setF(p=>({...p,name:v}))} req/>
      <G2><Field T={T} label="Telephone" value={f.phone} onChange={v=>setF(p=>({...p,phone:v}))}/><Field T={T} label="Email" value={f.email||""} onChange={v=>setF(p=>({...p,email:v}))}/></G2>
      <G2><Field T={T} label="N° Piece identite" value={f.nid||""} onChange={v=>setF(p=>({...p,nid:v}))}/><Field T={T} label="Nationalite" value={f.nationality||""} onChange={v=>setF(p=>({...p,nationality:v}))}/></G2>
      <Field T={T} label="Adresse" value={f.address||""} onChange={v=>setF(p=>({...p,address:v}))}/>

/* ═══════════════════════════════════════════════
   RAPPORTS
═══════════════════════════════════════════════ */
function Rapports({T,rooms,reservations,expenses,services,hotelName,whatsapp}){
  const [period,setPeriod]=useState("today");
  const today=dKey(Date.now()),cm=mKey(Date.now()),cy=yKey(Date.now());
  const fRes=p=>{if(p==="today")return reservations.filter(r=>!r.cancelled&&r.checkin===today);if(p==="month")return reservations.filter(r=>!r.cancelled&&r.checkin?.startsWith(cm));return reservations.filter(r=>!r.cancelled&&r.checkin?.startsWith(cy));};
  const fExp=p=>{if(p==="today")return expenses.filter(e=>dKey(e.ts)===today);if(p==="month")return expenses.filter(e=>mKey(e.ts)===cm);return expenses.filter(e=>yKey(e.ts)===cy);};
  const fSrv=p=>{if(p==="today")return(services||[]).filter(s=>dKey(s.ts)===today);if(p==="month")return(services||[]).filter(s=>mKey(s.ts)===cm);return(services||[]).filter(s=>yKey(s.ts)===cy);};
  const res=fRes(period),exp=fExp(period),srv=fSrv(period);
  const rev=res.reduce((s,r)=>s+(r.paid||0),0),srvR=srv.reduce((s,r)=>s+(r.amount||0),0),totR=rev+srvR,totE=exp.reduce((s,e)=>s+(e.amount||0),0),profit=totR-totE;
  const occ=rooms.filter(r=>r.status==="occupee").length,actif=rooms.filter(r=>r.status!=="maintenance").length||1,taux=Math.round(occ/actif*100);
  const byType={};res.forEach(r=>{byType[r.roomType]=(byType[r.roomType]||0)+(r.paid||0);});
  const byPay={};res.forEach(r=>{byPay[r.payMethod]=(byPay[r.payMethod]||0)+(r.paid||0);});
  const bySrc={};res.forEach(r=>{bySrc[r.source||"Direct"]=(bySrc[r.source||"Direct"]||0)+1;});
  const revPAR=res.length?rev/Math.max(1,res.reduce((s,r)=>s+(r.nights||1),0)):0;
  const sendWA=()=>{const pl=period==="today"?"Aujourd hui":period==="month"?cm:cy;const msg=`📊 RAPPORT ${hotelName}\n📅 Periode: ${pl}\n\n🏨 Occupation: ${taux}% (${occ}/${actif})\n\n💰 RECETTES\n• Hebergement: ${fmtF(rev)}\n• Services: ${fmtF(srvR)}\n• TOTAL: ${fmtF(totR)}\n\n📉 DEPENSES: ${fmtF(totE)}\n📈 BENEFICE: ${fmtF(profit)}\n\n📊 Reservations: ${res.length}\n✈️ Clients: ${new Set(res.map(r=>r.clientName)).size}\n🌙 Nuits vendues: ${res.reduce((s,r)=>s+(r.nights||0),0)}\n💵 RevPAR: ${fmtF(revPAR)}`;window.open(`https://wa.me/${(whatsapp||"").replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");};
  const Block=({title,rows})=>(<div style={{background:T.surface,borderRadius:14,padding:14,marginTop:10}}>
    <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>{title}</div>
    {rows.map(([l,v,c],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`,fontSize:12}}><span style={{color:T.sub}}>{l}</span><span style={{fontWeight:700,color:c||T.text}}>{v}</span></div>)}
  </div>);
  return(<div style={{flex:1,overflowY:"auto",padding:12}}>
    <div style={{display:"flex",gap:4,marginBottom:10}}>
      {[["today","Aujourd hui"],["month","Ce mois"],["year","Cette annee"]].map(([k,l])=><button key={k} onClick={()=>setPeriod(k)} style={{flex:1,background:period===k?T.accent:T.surface,border:"none",borderRadius:8,padding:"9px",fontWeight:700,fontSize:11,color:period===k?T.bg:T.text}}>{l}</button>)}
    </div>
    <Block title="💼 Resume financier" rows={[["Hebergement",fmtF(rev),T.green],["Services",fmtF(srvR),T.teal],["Total recettes",fmtF(totR),T.accent],["Depenses",fmtF(totE),T.red],["Benefice NET",fmtF(profit),profit>=0?T.green:T.red]]}/>
    <Block title="🏨 Activite" rows={[["Reservations",res.length,T.blue],["Clients uniques",new Set(res.map(r=>r.clientName)).size,T.purple],["Nuits vendues",res.reduce((s,r)=>s+(r.nights||0),0),T.orange],["RevPAR",fmtF(revPAR),T.teal],["Taux d occupation",`${taux}%`,taux>70?T.green:T.orange]]}/>
    {Object.keys(byType).length>0&&<Block title="🛏️ CA par type chambre" rows={Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([t,v])=>[t,fmtF(v),T.accent])}/>}
    {Object.keys(byPay).length>0&&<Block title="💳 Par mode de paiement" rows={Object.entries(byPay).sort((a,b)=>b[1]-a[1]).map(([p,v])=>[p,fmtF(v),T.blue])}/>}
    {Object.keys(bySrc).length>0&&<Block title="🌐 Sources" rows={Object.entries(bySrc).sort((a,b)=>b[1]-a[1]).map(([s,c])=>[s,`${c} res.`,T.purple])}/>}
    <button onClick={sendWA} style={{width:"100%",marginTop:12,background:T.gB.bg,border:`1px solid ${T.gB.bd}`,borderRadius:12,padding:13,color:T.green,fontWeight:700,fontSize:14}}>📱 Envoyer rapport WhatsApp</button>
  </div>);
}


/* ═══════════════════════════════════════════════

function Params({T,session,hid,rooms,reservations,expenses,services,clients,updPin,flash}){
  const [tab,setTab]=useState("hotel");
  const [hf,setHf]=useState({name:session.shopName||"",phone:session.shopPhone||"",address:session.address||"",email:session.email||"",stars:session.stars||3,website:session.website||""});
  const [pin1,setPin1]=useState("");const [pin2,setPin2]=useState("");

  const exportCSV=()=>{const hd=["Date","Client","Chambre","Nuits","Montant","Paiement","Source"];const rows=reservations.filter(r=>!r.cancelled).map(r=>[r.checkin,r.clientName,r.roomNum,r.nights,r.paid,r.payMethod,r.source]);const csv=[hd,...rows].map(r=>r.map(v=>v===undefined?"":v).join(";")).join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download=`reservations_${dKey(Date.now())}.csv`;a.click();flash("CSV telecharge !");};

      <G2><Field T={T} label="Telephone" value={hf.phone} onChange={v=>setHf(p=>({...p,phone:v}))}/><Field T={T} label="Email" value={hf.email} onChange={v=>setHf(p=>({...p,email:v}))}/></G2>
      <Field T={T} label="Adresse" value={hf.address} onChange={v=>setHf(p=>({...p,address:v}))}/>
      <Field T={T} label="Site web" value={hf.website||""} onChange={v=>setHf(p=>({...p,website:v}))}/>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:T.mute,fontWeight:600,marginBottom:6}}>Classement</div>
        <div style={{display:"flex",gap:5}}>
          {[1,2,3,4,5].map(s=><button key={s} onClick={()=>setHf(p=>({...p,stars:s}))} style={{background:s<=hf.stars?T.accent:T.sur2,border:"none",borderRadius:8,padding:"7px 13px",fontSize:18,color:s<=hf.stars?T.bg:"#aaa"}}>★</button>)}
        </div>
      </div>
      <button onClick={saveHotel} style={{width:"100%",background:T.accent,border:"none",borderRadius:10,padding:11,fontWeight:700,color:T.bg,fontSize:13}}>💾 Sauvegarder</button>
    </div>}
    {tab==="securite"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{background:T.surface,borderRadius:14,padding:16}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🔐 Modifier PIN Admin</div>
        <Field T={T} label="Nouveau PIN (4 chiffres)" type="password" value={pin1} onChange={v=>setPin1(v.replace(/\D/g,"").slice(0,4))}/>
        <Field T={T} label="Confirmer le PIN" type="password" value={pin2} onChange={v=>setPin2(v.replace(/\D/g,"").slice(0,4))}/>
        <button onClick={savePin} style={{width:"100%",background:T.accent,border:"none",borderRadius:10,padding:11,fontWeight:700,color:T.bg,fontSize:13}}>🔐 Modifier PIN</button>
      </div>
      <div style={{background:T.surface,borderRadius:14,padding:16}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📞 Support developpeur</div>

      </div>

    {tab==="stats"&&<div style={{background:T.surface,borderRadius:14,padding:16}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>📊 Statistiques globales</div>
      {[["Chambres enregistrees",rooms.length],["Reservations totales",reservations.length],["Clients enregistres",clients.length],["Services enregistres",(services||[]).length],["Depenses enregistrees",expenses.length],["CA total (hebergement)",fmtF(totCA)],["Recettes services",fmtF(totSrv)],["Depenses totales",fmtF(totExp)],["Benefice total",fmtF(totCA+totSrv-totExp)],["RevPAR moyen",fmtF(reservations.filter(r=>!r.cancelled).length?totCA/Math.max(1,reservations.filter(r=>!r.cancelled).reduce((s,r)=>s+(r.nights||1),0)):0)],].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.border}`,fontSize:12}}><span style={{color:T.sub}}>{k}</span><span style={{fontWeight:700}}>{v}</span></div>)}

    </div>}
  </div>);
}

      <div><div style={{fontSize:8,color:T.mute,letterSpacing:1.5,fontWeight:700}}>DEVELOPPEUR</div><div style={{fontFamily:"Outfit",fontWeight:800,color:T.purple,fontSize:15}}>Gestion Abonnements Hotel</div></div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>

      {loading&&<div style={{textAlign:"center",padding:40}}><div className="spin" style={{width:30,height:30,border:`2px solid ${T.border}`,borderTopColor:T.accent,borderRadius:"50%",margin:"0 auto"}}/></div>}
      {list.map(h=>{
        const dl=daysLeft(h.subscriptionEnd);const sc=!h.active?T.red:dl===0?T.red:dl<=7?T.orange:T.green;
        return(<div key={h.id} style={{background:T.surface,borderRadius:14,padding:14,marginBottom:10,borderLeft:`4px solid ${sc}`}}>

              <div style={{fontSize:10,color:T.mute,marginTop:1}}>Cree: {fmtD(h.createdAt)} · Plan: {h.plan||"mensuel"}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:11,fontWeight:700,color:sc}}>{h.active?(dl===0?"⚠️ Expire":dl<=7?"⚠️ Bientot":"✅ Actif"):"🔒 Suspendu"}</div>

/* ═══════════════════════════════════════════════
   FONCTIONNALITE 1 : CALENDRIER D OCCUPATION (vue mensuelle)
   Affiche l occupation jour par jour sur le mois courant
═══════════════════════════════════════════════ */
function CalendrierOccupation({T, rooms, reservations}){
  const [mois, setMois] = React.useState(()=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth(),1);});
  const ann = mois.getFullYear(), mo = mois.getMonth();
  const nbJours = new Date(ann, mo+1, 0).getDate();
  const premier = (new Date(ann, mo, 1).getDay()+6)%7; // lundi=0
  const jours = Array.from({length:nbJours},(_,i)=>i+1);
  const totalActives = rooms.filter(r=>r.status!=="maintenance").length || 1;

  const txJour = (j)=>{
    const d = String(ann)+"-"+String(mo+1).padStart(2,"0")+"-"+String(j).padStart(2,"0");
    const occ = reservations.filter(r=>!r.cancelled && r.checkin<=d && r.checkout>d).length;
    return Math.min(100, Math.round(occ/totalActives*100));
  };
  const coulTx = tx => tx>=80?T.red:tx>=50?T.orange:tx>=20?T.green:T.mute;
  const moisNoms=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

  return (
    <div style={{background:T.surface,borderRadius:16,padding:14,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={()=>setMois(new Date(ann,mo-1,1))} style={{background:T.sur2,border:"none",borderRadius:8,padding:"4px 10px",color:T.text,fontWeight:700}}>‹</button>
        <div style={{fontWeight:800,fontSize:13}}>{moisNoms[mo]} {ann}</div>
        <button onClick={()=>setMois(new Date(ann,mo+1,1))} style={{background:T.sur2,border:"none",borderRadius:8,padding:"4px 10px",color:T.text,fontWeight:700}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
        {["Lu","Ma","Me","Je","Ve","Sa","Di"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:T.mute,fontWeight:700}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {Array(premier).fill(null).map((_,i)=><div key={"e"+i}/>)}
        {jours.map(j=>{
          const tx=txJour(j);const col=coulTx(tx);const isToday=new Date().getDate()===j&&new Date().getMonth()===mo&&new Date().getFullYear()===ann;
          return(<div key={j} style={{background:tx>0?col+"22":T.sur2,border:`1px solid ${isToday?T.accent:T.border}`,borderRadius:6,padding:"4px 2px",textAlign:"center",cursor:"default"}}>
            <div style={{fontSize:9,fontWeight:isToday?800:500,color:isToday?T.accent:T.text}}>{j}</div>
            {tx>0&&<div style={{fontSize:8,color:col,fontWeight:700}}>{tx}%</div>}
          </div>);
        })}
      </div>
      <div style={{display:"flex",gap:10,marginTop:8,justifyContent:"center"}}>
        {[[T.green,"<50%"],[T.orange,"50-79%"],[T.red,"≥80%"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:2,background:c}}/><span style={{fontSize:9,color:T.mute}}>{l}</span></div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   FONCTIONNALITE 2 : MOTEUR DE RECHERCHE GLOBAL
   Recherche en temps réel dans chambres + réservations + clients
═══════════════════════════════════════════════ */
function RechercheGlobale({T, rooms, reservations, clients, services, onClose, onNav}){
  const [q,setQ]=React.useState("");const inputRef=React.useRef(null);
  React.useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),80);},[]);
  const ql=q.trim().toLowerCase();
  if(!ql) return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:5000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"60px 16px 16px"}}>
      <div style={{width:"100%",maxWidth:560,background:T.surface,borderRadius:20,padding:16,border:`1px solid ${T.border}`}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Rechercher chambre, client, réservation..." style={{flex:1,background:T.inp,border:`1px solid ${T.accent}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:13}}/>
          <button onClick={onClose} style={{background:T.rB.bg,border:"none",borderRadius:8,padding:"8px 12px",color:T.red,fontWeight:700}}>✕</button>
        </div>
        <div style={{fontSize:11,color:T.mute,textAlign:"center",padding:20}}>Tapez pour rechercher…</div>
      </div>
    </div>
  );
  const resRes=reservations.filter(r=>(r.clientName||"").toLowerCase().includes(ql)||(r.roomNum||"").includes(ql)||(r.clientPhone||"").includes(ql)||(r.clientNID||"").includes(ql)).slice(0,5);
  const resRooms=rooms.filter(r=>(r.num||"").includes(ql)||(r.type||"").toLowerCase().includes(ql)).slice(0,4);
  const resCli=clients.filter(c=>(c.name||"").toLowerCase().includes(ql)||(c.phone||"").includes(ql)).slice(0,4);
  const total=resRes.length+resRooms.length+resCli.length;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:5000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"60px 16px 16px"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",maxWidth:560,background:T.surface,borderRadius:20,padding:16,border:`1px solid ${T.border}`,maxHeight:"75dvh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Rechercher..." style={{flex:1,background:T.inp,border:`1px solid ${T.accent}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:13}}/>
          <button onClick={onClose} style={{background:T.rB.bg,border:"none",borderRadius:8,padding:"8px 12px",color:T.red,fontWeight:700}}>✕</button>
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          {total===0&&<div style={{textAlign:"center",padding:24,color:T.mute}}>Aucun résultat pour « {q} »</div>}
          {resRooms.length>0&&<><div style={{fontSize:10,color:T.mute,fontWeight:700,letterSpacing:1,marginBottom:5,padding:"4px 0"}}>CHAMBRES</div>
            {resRooms.map(r=><div key={r.id} onClick={()=>{onNav("chambres");onClose();}} style={{display:"flex",justifyContent:"space-between",background:T.sur2,borderRadius:10,padding:"8px 12px",marginBottom:4,cursor:"pointer"}}><span style={{fontWeight:700}}>#{r.num} — {r.type}</span><span style={{color:T.accent,fontSize:12}}>{fmtF(r.price)}/nuit</span></div>)}
          </>}
          {resRes.length>0&&<><div style={{fontSize:10,color:T.mute,fontWeight:700,letterSpacing:1,marginBottom:5,marginTop:8,padding:"4px 0"}}>RÉSERVATIONS</div>
            {resRes.map(r=><div key={r.id} onClick={()=>{onNav("reservations");onClose();}} style={{display:"flex",justifyContent:"space-between",background:T.sur2,borderRadius:10,padding:"8px 12px",marginBottom:4,cursor:"pointer"}}><div><div style={{fontWeight:700,fontSize:12}}>{r.clientName}</div><div style={{fontSize:10,color:T.sub}}>Ch.{r.roomNum} · {r.checkin} → {r.checkout}</div></div><span style={{color:T.accent,fontSize:12,fontWeight:700}}>{fmtF(r.paid||r.roomTotal||0)}</span></div>)}
          </>}
          {resCli.length>0&&<><div style={{fontSize:10,color:T.mute,fontWeight:700,letterSpacing:1,marginBottom:5,marginTop:8,padding:"4px 0"}}>CLIENTS</div>
            {resCli.map(c=><div key={c.id} onClick={()=>{onNav("clients_admin");onClose();}} style={{display:"flex",justifyContent:"space-between",background:T.sur2,borderRadius:10,padding:"8px 12px",marginBottom:4,cursor:"pointer"}}><span style={{fontWeight:700}}>{c.vip?"⭐ ":""}{c.name}</span><span style={{fontSize:11,color:T.sub}}>{c.phone}</span></div>)}
          </>}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   FONCTIONNALITE 3 : TABLEAU DE BORD AMÉLIORÉ
   Avec CalendrierOccupation intégré + alertes check-in/out
═══════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════
   AUTH + APP ROOT
═══════════════════════════════════════════════ */
function App(){
  const [themeName,setThemeName]=useState(()=>localStorage.getItem("hotel_theme")||"dark");
  const T=TH[themeName];
  const [session,setSession]=useState(null);const [mode,setMode]=useState("login");
  const [f,setF]=useState({shopName:"",ownerName:"",whatsapp:"",phone:"",password:"",confirm:""});
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const [devMode,setDevMode]=useState(false);const [devErr,setDevErr]=useState("");
  const [toasts,setToasts]=useState([]);
  const clickRef=useRef({n:0,t:null});

  useEffect(()=>{document.documentElement.style.setProperty("--bg",T.bg);localStorage.setItem("hotel_theme",themeName);},[themeName,T]);

  const flash=(msg,type="ok")=>{const id=uid();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600);};
  const tripleClick=()=>{const r=clickRef.current;r.n++;clearTimeout(r.t);if(r.n>=3){r.n=0;setDevMode(true);}r.t=setTimeout(()=>r.n=0,500);};

  const register=async()=>{
    if(!f.shopName.trim()||!f.ownerName.trim()||!f.whatsapp.trim()||f.password.length<4||f.password!==f.confirm){setErr("Verifiez tous les champs");return;}
    setLoading(true);setErr("");
    try{
      const ex=await db.collection("shops").where("shopName","==",f.shopName.trim()).get();
      if(!ex.empty)throw new Error("Ce nom est deja utilise");
      const id="hotel_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
      const now=Date.now();
      await db.collection("shops").doc(id).set({shopName:f.shopName.trim(),ownerName:f.ownerName.trim(),whatsapp:f.whatsapp.trim(),shopPhone:f.phone.trim(),password:btoa(f.password),createdAt:now,active:true,plan:"mensuel",subscriptionStart:now,subscriptionEnd:calcEnd(now,"mensuel"),adminPin:btoa("0000"),type:"hotel"});
      for(const col of ["rooms","reservations","expenses","services","clients"]){await db.collection("shops").doc(id).collection(col).doc("_init").set({_init:true});}
      flash("Hotel cree ! Connectez-vous.");setMode("login");
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  const login=async()=>{
    if(!f.shopName.trim()||!f.password){setErr("Nom et mot de passe requis");return;}
    setLoading(true);setErr("");
    try{
      const snap=await db.collection("shops").where("shopName","==",f.shopName.trim()).get();
      if(snap.empty)throw new Error("Hotel introuvable");
      const doc=snap.docs[0];const data=doc.data();
      if(btoa(f.password)!==data.password)throw new Error("Mot de passe incorrect");
      if(data.active===false)throw new Error("Compte desactive — contactez votre administrateur");
      setSession({shopId:doc.id,...data});
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  const logout=()=>setSession(null);

  /* DEV LOGIN */
  if(devMode&&!session){return(<div style={{minHeight:"100dvh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{maxWidth:360,width:"100%",background:T.surface,borderRadius:28,padding:28,border:`1px solid ${T.border}`}}>
      <PinPad T={T} length={6} title="🔧" subtitle="Acces Developpeur" err={devErr}
        onConfirm={(val,reset)=>{if(val===DEV_PIN){setDevMode(false);setSession({shopId:"__dev__",shopName:"Developpeur",isDev:true});}else{setDevErr("Code incorrect");reset();}}}
        onCancel={()=>setDevMode(false)}/>
    </div>
    <ToastStack toasts={toasts}/>
  </div>);}

  if(session){return(<>{session.isDev?<DevDashboard T={T} themeName={themeName} setThemeName={setThemeName} logout={logout} flash={flash}/>:<MainApp session={session} T={T} themeName={themeName} setThemeName={setThemeName} logout={logout} flash={flash}/>}<ToastStack toasts={toasts}/></>);}

  return(<div style={{minHeight:"100dvh",background:T.bg,color:T.text,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
    <div style={{maxWidth:430,width:"100%"}}>
      <div style={{textAlign:"center",marginBottom:24,cursor:"pointer",userSelect:"none"}} onClick={tripleClick}>
        <div style={{fontSize:60,marginBottom:8}}>🏨</div>
        <div style={{fontFamily:"Outfit",fontSize:30,fontWeight:900,color:T.accent,letterSpacing:.5}}>Hotel SaaS Pro</div>
        <div style={{fontSize:10,color:T.mute,marginTop:4}}>Gestion hoteliere complete · Triple-clic = acces developpeur</div>
      </div>
      <div style={{background:T.surface,borderRadius:24,padding:22,border:`1px solid ${T.border}`}}>
        <div style={{display:"flex",background:T.sur2,borderRadius:12,padding:3,marginBottom:16,gap:4}}>
          {[["login","Connexion"],["register","Creer un hotel"]].map(([m,l])=><button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,background:mode===m?T.accent:"transparent",border:"none",borderRadius:8,padding:"9px",fontWeight:700,fontSize:13,color:mode===m?T.bg:T.sub}}>{l}</button>)}
        </div>
        <Field T={T} label="Nom de l hotel" value={f.shopName} onChange={v=>setF(p=>({...p,shopName:v}))} ph="Ex: Hotel Laico Ouagadougou" req/>
        {mode==="register"&&<>
          <Field T={T} label="Nom du proprietaire" value={f.ownerName} onChange={v=>setF(p=>({...p,ownerName:v}))} req/>
          <G2><Field T={T} label="WhatsApp (226...)" value={f.whatsapp} onChange={v=>setF(p=>({...p,whatsapp:v}))} req/><Field T={T} label="Telephone" value={f.phone} onChange={v=>setF(p=>({...p,phone:v}))}/></G2>
        </>}
        <Field T={T} label="Mot de passe" type="password" value={f.password} onChange={v=>setF(p=>({...p,password:v}))} req/>
        {mode==="register"&&<Field T={T} label="Confirmer le mot de passe" type="password" value={f.confirm} onChange={v=>setF(p=>({...p,confirm:v}))} req/>}
        {err&&<div style={{background:T.rB.bg,border:`1px solid ${T.rB.bd}`,borderRadius:10,padding:"9px 12px",color:T.red,fontSize:12,fontWeight:600,marginBottom:10}}>{err}</div>}
        <button onClick={mode==="register"?register:login} disabled={loading} style={{width:"100%",background:T.accent,border:"none",borderRadius:14,padding:14,fontWeight:800,fontSize:15,color:T.bg,opacity:loading?.6:1}}>
          {loading?"Chargement...":(mode==="register"?"🏨 Creer l hotel":"🔑 Se connecter")}
        </button>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:14}}>
        {Object.values(TH).map(t=><button key={t.id} onClick={()=>setThemeName(t.id)} style={{background:themeName===t.id?T.accent:T.surface,border:`1px solid ${T.border}`,borderRadius:20,width:36,height:36,fontSize:16}}>{t.icon}</button>)}
      </div>
    </div>
    <ToastStack toasts={toasts}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
